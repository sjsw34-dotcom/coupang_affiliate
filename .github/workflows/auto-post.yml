name: Auto Post Generator

on:
  schedule:
    # 하루 3회, 8시간 간격 — 카테고리별 1포스트씩
    # 15:00 UTC = 00:00 KST (자정)
    - cron: '0 15 * * *'
    # 23:00 UTC = 08:00 KST (아침)
    - cron: '0 23 * * *'
    # 07:00 UTC = 16:00 KST (오후)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of posts to generate'
        required: false
        default: '1'
      category:
        description: 'Category (electronics, car-accessories, camping-outdoor)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: auto-post
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate post
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COUPANG_PARTNERS_ACCESS_KEY: ${{ secrets.COUPANG_PARTNERS_ACCESS_KEY }}
          COUPANG_PARTNERS_SECRET_KEY: ${{ secrets.COUPANG_PARTNERS_SECRET_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NEXT_PUBLIC_SITE_URL: https://chulmall.com
        run: |
          COUNT="${{ github.event.inputs.count }}"
          CATEGORY="${{ github.event.inputs.category }}"
          COUNT="${COUNT:-1}"

          if [ -n "$CATEGORY" ]; then
            npx tsx scripts/generate-posts.ts --count "$COUNT" --category "$CATEGORY"
          else
            npx tsx scripts/generate-posts.ts --count "$COUNT"
          fi
